# Blueprint do Render — sobe site + API + banco a partir deste repositório.
# Passo a passo humano em DEPLOY.md.
#
# IMPORTANTE: os nomes "alpha-hub-api" e "alpha-hub-web" viram a URL pública
# (https://<nome>.onrender.com). Se algum nome já estiver em uso, o Render pede
# outro — e aí você troca também os dois valores de URL (WEB_ORIGIN e
# NEXT_PUBLIC_API_URL) abaixo para baterem.

databases:
  - name: alpha-hub-db
    databaseName: alphahub
    user: alphahub
    plan: free

services:
  # ---------- API (NestJS) ----------
  - type: web
    name: alpha-hub-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && (npx prisma db seed || true) && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: WEB_ORIGIN
        value: https://alpha-hub-web.onrender.com
      # P0 segurança: defina uma senha admin forte no painel do Render.
      # Se ficar em branco, cai na senha de demonstração (troque antes de divulgar).
      - key: ADMIN_SENHA
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # "Esqueci a senha" por e-mail (Resend). SEM a chave o recurso fica
      # DESLIGADO (link não aparece no login; endpoint responde 503).
      # Crie grátis em https://resend.com e cole a API key no painel.
      - key: RESEND_API_KEY
        sync: false
      # Remetente opcional; sem domínio verificado use o padrão
      # "Alpha Hub <onboarding@resend.dev>" (já é o default do código).
      - key: RESEND_FROM
        sync: false

  # ---------- Web (Next.js) ----------
  - type: web
    name: alpha-hub-web
    runtime: node
    rootDir: apps/web
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://alpha-hub-api.onrender.com
      # URL pública canônica (metadataBase p/ SEO/OpenGraph, sitemap, canonical).
      - key: NEXT_PUBLIC_SITE_URL
        value: https://alpha-hub-web.onrender.com
